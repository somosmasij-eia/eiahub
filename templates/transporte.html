{% extends "base.html" %}
{% block title %}Transporte — EIA Striges{% endblock %}
 
{% block content %}
<div class="page-body">
  <div class="page-header">
    <a href="{{ url_for('main.dashboard') }}" class="back-btn">‹</a>
    <h1>Transporte</h1>
  </div>
 
  <a href="{{ url_for('main.registro_ruta') }}" class="btn-action">
    🚌 Registrarme en una ruta
  </a>
 
  <p class="section-label">Rutas disponibles</p>
 
  <div class="route-list">
    {% for ruta in rutas %}
    <div class="route-item">
      <span class="route-dot"></span>
      {{ ruta }}
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
