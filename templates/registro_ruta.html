{% extends "base.html" %}
{% block title %}Registro de Ruta — EIA Striges{% endblock %}
 
{% block content %}
<div class="page-body">
  <div class="page-header">
    <a href="{{ url_for('main.transporte') }}" class="back-btn">‹</a>
    <h1>Registrarme en una ruta</h1>
  </div>
 
  <form method="POST" class="form-card">
    <div class="form-group">
      <label for="ruta">¿Para dónde vas?</label>
      <select id="ruta" name="ruta" required>
        <option value="" disabled selected>Elige tu ruta</option>
        {% for r in rutas %}
          <option value="{{ r }}">{{ r }}</option>
        {% endfor %}
      </select>
    </div>
 
    <div class="form-group">
      <label for="horario">Horario</label>
      <select id="horario" name="horario" required>
        <option value="" disabled selected>Elige el horario</option>
        <option value="Mañana">🌅 Mañana</option>
        <option value="Tarde">🌇 Tarde</option>
      </select>
    </div>
 
    <div class="check-row">
      <input type="checkbox" id="terminos" name="terminos" required/>
      <label for="terminos">
        Leí y acepto los <a href="#">términos y condiciones</a> del servicio
      </label>
    </div>
 
    <button type="submit" class="btn-action">Listo, guardar</button>
  </form>
</div>
{% endblock %}
